name: Production
"on":
  push:
    branches:
      - main
env:
  AWS_REGION: us-east-1
concurrency:
  group: formio-production
jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@orbital-installation-technologies"

      - name: Install Dependencies
        run: npm install

      - name: Build Webpack Bundle
        run: webpack --config ./webpack.prod.cjs --env buildNumber=${{ github.run_number }}

      - uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks
        env:
          AWS_S3_BUCKET: form-cdn.orbitalcustoms.com
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          SOURCE_DIR: "dist"
          DEST_DIR: "components"

      - name: Prepare package metadata for GitHub Packages
        run: |
          npm pkg set name="@orbital-installation-technologies/formiocomponents"
          npm version --no-git-tag-version "1.1.${{ github.run_number }}-${{ github.run_attempt }}"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Build ${{ github.run_number }}
          body: ${{ steps.tag_version.outputs.changelog }}
